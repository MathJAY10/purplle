store_id: default-store
name: Default Store
timezone: UTC
cameras:
  - camera_id: entry
    source: sample.mp4
    entry_line:
      - {x: 100, y: 100}
      - {x: 500, y: 100}
    zone_polygons:
      billing:
        - [300, 300]
        - [450, 300]
        - [450, 500]
        - [300, 500]
    thresholds:
      confidence: 0.35
      dwell_seconds: 5
    frame_skip: 2
