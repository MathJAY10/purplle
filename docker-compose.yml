services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: store-intelligence-migrate
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: store-intelligence-api
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8001:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: store-intelligence-worker
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python -m app.workers.run_worker
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; print('worker alive')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: store-intelligence-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-store_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-store_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-store_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-store_user} -d ${POSTGRES_DB:-store_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: store-intelligence-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
